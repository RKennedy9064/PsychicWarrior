name: Build

on:
  push:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download game DLLs
        env:
          GH_TOKEN: ${{ secrets.LIBS_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force "C:\WrathGame\Wrath_Data\Managed"
          gh release download game-libs --dir "C:\WrathGame\Wrath_Data\Managed" --repo RKennedy9064/PsychicWarrior-libs

      - name: Build
        run: dotnet build /p:WrathPath="C:\WrathGame" --configuration Release

      - name: Package
        if: github.ref == 'refs/heads/master'
        run: |
          $out = "bin\Release\net472"
          Compress-Archive -Path "$out\PsychicWarrior.dll", "$out\BlueprintCore.dll", "$out\Info.json" `
            -DestinationPath "PsychicWarrior-alpha-${{ github.run_number }}.zip"

      - name: Release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "alpha-${{ github.run_number }}" `
            "PsychicWarrior-alpha-${{ github.run_number }}.zip" `
            --repo ${{ github.repository }} `
            --title "Alpha Build ${{ github.run_number }}" `
            --notes "Automated alpha build from commit ${{ github.sha }}." `
            --prerelease
