name: Build

on:
  push:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download game DLLs
        env:
          GH_TOKEN: ${{ secrets.LIBS_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force "C:\WrathGame\Wrath_Data\Managed"
          gh release download game-libs --dir "C:\WrathGame\Wrath_Data\Managed" --repo RKennedy9064/PsychicWarrior-libs

      - name: Build
        run: dotnet build /p:WrathPath="C:\WrathGame" --configuration Release

      - name: Extract changelog section
        if: github.ref == 'refs/heads/master'
        run: |
          $content = Get-Content CHANGELOG.md -Raw
          $sections = $content -split '(?m)^## \['
          if ($sections.Length -lt 2) {
            "See CHANGELOG.md" | Out-File release_notes.txt -Encoding utf8
          } else {
            ("## [" + $sections[1].Trim()) | Out-File release_notes.txt -Encoding utf8
          }

      - name: Package and Release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content Info.json | ConvertFrom-Json).Version
          Write-Host "Releasing version: $version"
          $out = "bin\Release\net472"
          $zip = "PsychicWarrior-$version.zip"
          Compress-Archive -Path "$out\PsychicWarrior.dll", "$out\BlueprintCore.dll", "$out\Info.json" `
            -DestinationPath $zip
          gh release delete "v$version" --yes --cleanup-tag --repo ${{ github.repository }} 2>$null
          gh release create "v$version" $zip `
            --repo ${{ github.repository }} `
            --title "v$version" `
            --notes-file release_notes.txt `
            --prerelease
